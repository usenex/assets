<!DOCTYPE html>
<html lang="en">

<head>
    <base href="https://cdn.jsdelivr.net/gh/UseNex/g-assets/external/assets/fnaf-sister-location/">
    <link rel="stylesheet" type="text/css" href="style.css"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="HandheldFriendly" content="true" />
    <title>FNAF: Sister Location</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;overflow:hidden}
        body{background:#000;min-height:100vh;display:flex;justify-content:center;align-items:center}
        
        #slim-loader{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:1px;
            background:rgba(255,255,255,0.08);
            z-index:10001;
            opacity:1;
            transition:opacity 0.3s ease;
        }
        #slim-loader-bar{
            width:0%;
            height:100%;
            background:#fff;
            box-shadow:0 0 4px #fff;
            transition:width 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        } 
        
        #overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#000;
            background-image:url('bgstart.webp');
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:10000;
            transition:opacity 0.4s ease;
        }
        #overlay::before{
            content:'';
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.1);
        }
        .loader-center{
            position:relative;
            z-index:1;
            text-align:center;
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
        }
        .percent{
            font-family:system-ui,monospace;
            font-size:48px;
            font-weight:300;
            color:#fff;
            opacity:0.6;
            letter-spacing:2px;
            width:150px;
            height:auto;
            padding:20px;
        }
        .percent small{
            font-size:20px;
            opacity:0.9;
        }
        canvas{display:block}
        .hidden{display:none!important}
    </style>
</head>

<body>
    <div style="display:inline-block;text-align:left">
        <canvas id="MMFCanvas" width="1280" height="720"></canvas>
    </div>
    
    <div id="overlay">
        <div class="loader-center">
            <div class="percent" id="percentDisplay">0<small>%</small></div>
        </div>
    </div>
    <div id="slim-loader"><div id="slim-loader-bar"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        (function(){
            "use strict";
            
            const RUNTIME = "resources/Five Night's at Freddys Sister Location.cch";
            const PARTS = 40;
            const PART_URLS = Array.from({length: PARTS}, (_,i) => `resources.zip.part${i+1}`);
            const CACHE_NAME = 'fnaf-sl-cache-v1';
            
            const loaderBar = document.getElementById('slim-loader-bar');
            const overlay = document.getElementById('overlay');
            const percentDisplay = document.getElementById('percentDisplay');
            const resourceCache = new Map();
            let started = false;
            let currentProgress = 0;
            let cacheAvailable = false;
            
            const setProgress = (percent) => {
                if(percent < currentProgress) return;
                currentProgress = Math.min(100, Math.max(0, Math.floor(percent)));
                if(loaderBar) loaderBar.style.width = currentProgress + '%';
                if(percentDisplay) percentDisplay.innerHTML = currentProgress + '<small>%</small>';
            };
            
            const hideLoader = () => {
                const slim = document.getElementById('slim-loader');
                if(slim) slim.style.opacity = '0';
                if(overlay) overlay.style.opacity = '0';
                setTimeout(() => {
                    if(slim) slim.classList.add('hidden');
                    if(overlay) overlay.classList.add('hidden');
                }, 400);
            };
            
            const yieldMain = () => new Promise(r => {
                if('requestIdleCallback' in window) requestIdleCallback(() => r(), {timeout: 16});
                else setTimeout(r, 1);
            });
            
            const initCache = async () => {
                if(!('caches' in window)) return false;
                try {
                    const cache = await caches.open(CACHE_NAME);
                    cacheAvailable = true;
                    return cache;
                } catch {
                    return false;
                }
            };
            
            const getCachedResponse = async (url) => {
                if(!cacheAvailable) return null;
                try {
                    const cache = await caches.open(CACHE_NAME);
                    return await cache.match(url);
                } catch {
                    return null;
                }
            };
            
            const cacheResponse = async (url, response) => {
                if(!cacheAvailable) return;
                try {
                    const cache = await caches.open(CACHE_NAME);
                    await cache.put(url, response.clone());
                } catch {}
            };
            
            const getTotalSize = async (urls) => {
                const sizes = await Promise.all(urls.map(async url => {
                    try {
                        const cached = await getCachedResponse(url);
                        if(cached) {
                            const blob = await cached.blob();
                            return blob.size;
                        }
                        const res = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
                        const size = parseInt(res.headers.get('Content-Length') || '0', 10);
                        return size;
                    } catch { return 0; }
                }));
                return sizes.reduce((a,b) => a + b, 0);
            };
            
            const mergeParts = async (urls, onProgress) => {
                const total = await getTotalSize(urls);
                if(total === 0) throw new Error('Size calculation failed');
                
                let loaded = 0;
                const chunks = [];
                
                for(let i = 0; i < urls.length; i++) {
                    let response;
                    const cached = await getCachedResponse(urls[i]);
                    
                    if(cached) {
                        response = cached;
                        const blob = await cached.blob();
                        chunks.push(blob);
                        loaded += blob.size;
                        onProgress((loaded / total) * 60);
                    } else {
                        response = await fetch(urls[i], { cache: 'no-cache' });
                        await cacheResponse(urls[i], response);
                        
                        const reader = response.body.getReader();
                        const partChunks = [];
                        
                        while(true) {
                            const {done, value} = await reader.read();
                            if(done) break;
                            partChunks.push(value);
                            loaded += value.length;
                            onProgress((loaded / total) * 60);
                            if(partChunks.length % 80 === 0) await yieldMain();
                        }
                        
                        chunks.push(new Blob(partChunks));
                    }
                    
                    await yieldMain();
                }
                
                return new Blob(chunks);
            };
            
            const extractZip = async (blob, startPercent) => {
                const zip = await JSZip.loadAsync(blob);
                const files = Object.keys(zip.files).filter(n => !zip.files[n].dir);
                const total = files.length;
                
                const BATCH = 4;
                const remainingPercent = 40;
                let extracted = 0;
                
                for(let i = 0; i < total; i += BATCH) {
                    const batch = files.slice(i, i + BATCH);
                    
                    for(const name of batch) {
                        const cached = resourceCache.get(name);
                        if(cached) {
                            extracted++;
                            continue;
                        }
                        
                        const data = await zip.files[name].async('blob');
                        const blobUrl = URL.createObjectURL(data);
                        resourceCache.set(name, blobUrl);
                        
                        const cacheKey = `resources/${name}`;
                        const cachedResponse = await getCachedResponse(cacheKey);
                        if(!cachedResponse && cacheAvailable) {
                            try {
                                const cache = await caches.open(CACHE_NAME);
                                const response = new Response(data, {
                                    headers: { 'Content-Type': 'application/octet-stream' }
                                });
                                await cache.put(cacheKey, response);
                            } catch {}
                        }
                        
                        extracted++;
                        const extractProgress = (extracted / total) * remainingPercent;
                        setProgress(startPercent + extractProgress);
                    }
                    
                    await yieldMain();
                }
                
                return true;
            };
            
            const setupInterceptor = () => {
                const origFetch = window.fetch;
                window.fetch = async (input, init) => {
                    if(typeof input === 'string' && input.startsWith('resources/')) {
                        const name = input.split('/').pop();
                        
                        const cachedBlob = resourceCache.get(name);
                        if(cachedBlob) return origFetch(cachedBlob, init);
                        
                        if(cacheAvailable) {
                            const cached = await getCachedResponse(input);
                            if(cached) return cached;
                        }
                    }
                    return origFetch(input, init);
                };
                
                const origOpen = XMLHttpRequest.prototype.open;
                XMLHttpRequest.prototype.open = function(method, url) {
                    if(url && url.startsWith('resources/')) {
                        const name = url.split('/').pop();
                        const cached = resourceCache.get(name);
                        if(cached) arguments[1] = cached;
                    }
                    return origOpen.apply(this, arguments);
                };
                
                const media = [HTMLImageElement, HTMLAudioElement, HTMLVideoElement];
                for(const T of media) {
                    const desc = Object.getOwnPropertyDescriptor(T.prototype, 'src');
                    if(desc?.set) {
                        Object.defineProperty(T.prototype, 'src', {
                            set: function(v) {
                                if(typeof v === 'string' && v.startsWith('resources/')) {
                                    const name = v.split('/').pop();
                                    const cached = resourceCache.get(name);
                                    if(cached) v = cached;
                                }
                                desc.set.call(this, v);
                            }
                        });
                    }
                }
            };
            
            const launchGame = () => {
                if(started) return;
                started = true;
                setupInterceptor();
                
                const script = document.createElement('script');
                script.src = 'Runtime.js';
                script.onload = () => {
                    hideLoader();
                    if(typeof Runtime !== 'undefined') {
                        new Runtime("MMFCanvas", RUNTIME);
                    }
                };
                document.head.appendChild(script);
            };
            
            const main = async () => {
                setProgress(0);
                await initCache();
                
                try {
                    const hasParts = await fetch(PART_URLS[0], { method: 'HEAD', cache: 'no-cache' }).catch(() => null);
                    let zipBlob;
                    
                    if(hasParts?.ok) {
                        zipBlob = await mergeParts(PART_URLS, (p) => setProgress(p));
                        setProgress(60);
                    } else {
                        const cachedZip = await getCachedResponse('resources.zip');
                        let response;
                        
                        if(cachedZip) {
                            response = cachedZip;
                            const blob = await cachedZip.blob();
                            const total = blob.size;
                            let loaded = 0;
                            const reader = blob.stream().getReader();
                            const chunks = [];
                            
                            while(true) {
                                const {done, value} = await reader.read();
                                if(done) break;
                                chunks.push(value);
                                loaded += value.length;
                                setProgress((loaded / total) * 60);
                                if(chunks.length % 60 === 0) await yieldMain();
                            }
                            zipBlob = new Blob(chunks);
                        } else {
                            response = await fetch('resources.zip', { cache: 'no-cache' });
                            await cacheResponse('resources.zip', response);
                            
                            const total = parseInt(response.headers.get('Content-Length') || '0', 10);
                            let loaded = 0;
                            const chunks = [];
                            const reader = response.body.getReader();
                            
                            while(true) {
                                const {done, value} = await reader.read();
                                if(done) break;
                                chunks.push(value);
                                loaded += value.length;
                                if(total > 0) {
                                    setProgress((loaded / total) * 60);
                                }
                                if(chunks.length % 60 === 0) await yieldMain();
                            }
                            zipBlob = new Blob(chunks);
                        }
                        
                        setProgress(60); 
                    }
                    
                    await extractZip(zipBlob, 60);
                    URL.revokeObjectURL(URL.createObjectURL(zipBlob));
                    setProgress(100);
                    
                    await yieldMain();
                    launchGame();
                    
                } catch(e) {
                    console.error(e);
                    setProgress(100);
                    setTimeout(() => launchGame(), 500);
                }
            };
            
            main();
        })();
    </script>
</body>

</html>
