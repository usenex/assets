<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e17;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .game-wrapper {
            width: 100%;
            max-width: 960px;
            height: 100%;
            max-height: 540px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-spinner, .error-panel {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        button {
            padding: 8px 16px;
            background: #3498db;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background: #2980b9;
        }

        .toast-notification {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(13, 20, 35, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            pointer-events: none;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-icon {
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div id="gameContainer">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>loading...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-notification">
        <span class="toast-icon"></span>
        <span id="toast-message"></span>
    </div>

    <script>
        (function() {
            var CDN = 'https://cdn.jsdelivr.net/gh/usenex/g-assets/external/assets/a-dance-of-fire-and-ice/';
            var box = document.getElementById('gameContainer');
            var started = false;
            var retry = 0;

            function killAudioContexts() {
                var audioTags = document.querySelectorAll('audio, video');
                audioTags.forEach(function(el) {
                    el.pause();
                    el.src = '';
                    el.load();
                    el.remove();
                });

                if (window.AudioContext || window.webkitAudioContext) {
                    var actx = window.AUDIO_CONTEXT_INSTANCES || [];
                    actx.forEach(function(ctx) {
                        if (ctx && ctx.state !== 'closed') {
                            ctx.close();
                        }
                    });
                    
                    if (window.game && window.game.audioContext && typeof window.game.audioContext.close === 'function') {
                        window.game.audioContext.close();
                    }
                }
            }

            var nativeAudioContext = window.AudioContext || window.webkitAudioContext;
            if (nativeAudioContext) {
                window.AUDIO_CONTEXT_INSTANCES = [];
                var HookedAudioContext = function() {
                    var ctx = new nativeAudioContext();
                    window.AUDIO_CONTEXT_INSTANCES.push(ctx);
                    return ctx;
                };
                HookedAudioContext.prototype = nativeAudioContext.prototype;
                if (window.AudioContext) window.AudioContext = HookedAudioContext;
                if (window.webkitAudioContext) window.webkitAudioContext = HookedAudioContext;
            }

            function triggerGameRestart() {
                showToast('Memory limit exceeded. Restarting engine...');
                
                if (window.game && typeof window.game.Quit === 'function') {
                    try {
                        window.game.Quit();
                    } catch(e) {}
                }
                
                killAudioContexts();
                
                started = false;
                box.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>restarting...</p></div>';
                
                setTimeout(function() {
                    var toast = document.getElementById('toast');
                    toast.classList.remove('show');
                    instantiateGame();
                }, 2000);
            }

            var oldAlert = window.alert;
            window.alert = function(message) {
                if (message && (message.indexOf('memory access out of bounds') !== -1 || message.indexOf('out of bounds memory access') !== -1)) {
                    triggerGameRestart();
                    return true;
                }
                return oldAlert.apply(window, arguments);
            };

            window.addEventListener('error', function(e) {
                var msg = e.message || '';
                if (msg.indexOf('memory access out of bounds') !== -1 || msg.indexOf('out of bounds memory access') !== -1) {
                    e.preventDefault();
                    triggerGameRestart();
                }
            }, true);

            function showToast(text) {
                var toast = document.getElementById('toast');
                var msg = document.getElementById('toast-message');
                msg.textContent = text;
                toast.classList.add('show');
            }

            function showError(msg) {
                if (started) return;
                box.innerHTML = '<div class="error-panel">' +
                    '<svg width="48" height="48" viewBox="0 0 24 24" fill="none">' +
                    '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#4a5d78"/>' +
                    '</svg>' +
                    '<h2 style="margin:16px 0 8px; color: #fff;">connection error</h2>' +
                    '<p style="color: #a0aec0;">' + msg + '</p>' +
                    '<button onclick="location.reload()">retry</button>' +
                    '</div>';
                box.style.minHeight = '540px';
            }

            function instantiateGame() {
                if (window.UnityLoader) {
                    try {
                        window.game = UnityLoader.instantiate('gameContainer', CDN + 'Build/adofaiii4.json');
                        started = true;
                    } catch (e) {
                        showError('unity error');
                    }
                } else {
                    showError('loader missing');
                }
            }

            function loadGame() {
                var s = document.createElement('script');
                s.src = CDN + 'Build/UnityLoader.js';
                
                s.onload = function() {
                    if (window.UnityLoader && !started) {
                        instantiateGame();
                    } else if (!started) {
                        showError('loader fail');
                    }
                };

                s.onerror = function() {
                    if (retry < 2) {
                        retry++;
                        setTimeout(loadGame, 500);
                    } else {
                        showError('cdn unreachable');
                    }
                };

                document.head.appendChild(s);
            }

            fetch(CDN + 'Build/adofaiii4.json', { method: 'HEAD' })
                .then(function() {
                    loadGame();
                })
                .catch(function() {
                    loadGame();
                });
        })();
    </script>
</body>
</html>
